appId: net.massa.gossip.desktop
productName: Gossip
copyright: Copyright © Gossip

directories:
  output: release
  buildResources: build

# The app loads the web UI remotely, so there are no local web assets to bundle
# and no runtime node_modules — just the compiled main + preload. Keep it lean.
files:
  - dist/**/*
  - package.json
  - "!**/*.map"

# Don't rebuild native modules (there are none) — avoids pnpm/monorepo hoisting
# issues during packaging.
npmRebuild: false
electronVersion: 43.1.1

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  category: public.app-category.social-networking
  target:
    - target: dmg
      arch: [arm64, x64]
  icon: build/icon.png
  # Unsigned by default (no cert). hardenedRuntime/notarization only make sense
  # with signing, so leave them off until CSC_*/APPLE_* secrets are added.
  gatekeeperAssess: false

linux:
  category: Network
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  maintainer: Gossip

# GitHub Releases as the update/publish channel (used by CI on tag builds).
publish:
  provider: github
  owner: danielgmorosan
  repo: Gossip-Enterpise

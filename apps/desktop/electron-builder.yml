appId: chat.umbry.desktop
productName: Umbry
copyright: Copyright © Umbry

directories:
  output: release
  buildResources: build

# Package the compiled main + preload plus the one production dependency
# (electron-updater, for auto-update). electron-builder resolves the production
# dependency tree from package.json `dependencies` and includes it automatically
# even alongside these explicit app-file globs. The web UI is shipped separately
# as extraResources (below), not in the asar. Keep it lean.
files:
  - dist/**/*
  - package.json
  - "!**/*.map"

# Ship the built web app (apps/web/dist) inside the package so the shell serves
# it locally from the app:// scheme instead of loading umbry.chat over the
# network. Lands at <resources>/web; main.ts reads it via process.resourcesPath.
extraResources:
  - from: ../web/dist
    to: web
  # Self-host stack templates (Mode B). Copied out to userData on first start so
  # `docker compose` has a writable project dir — see src/selfhost.ts.
  - from: ../../services/selfhost
    to: stack/selfhost
    filter:
      - docker-compose.yml
      - livekit.yaml
  - from: ../../services/relay
    to: stack/relay
    filter:
      - Dockerfile
      - package.json
      - server.mjs

# Don't rebuild native modules (there are none) — avoids pnpm/monorepo hoisting
# issues during packaging.
npmRebuild: false
# Pinned explicitly: electron-builder's auto-detect resolves the wrong version in
# this pnpm workspace (it can pick a stale copy from the store). MUST match
# apps/desktop package.json's electron devDependency. Held at 38 because 39–43
# ship a macOS regression that makes screen-share system audio a live-but-SILENT
# track (verified by bisection on macOS 26); 38 is the newest release where
# loopback audio actually carries samples. Revisit when Electron fixes it.
electronVersion: 38.8.6

win:
  # Ship the native screenshare-audio capturer (built by CI) at resources root,
  # where audioCapture.ts looks for it (process.resourcesPath/loopback.exe).
  extraResources:
    - from: native/loopback/loopback.exe
      to: loopback.exe
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png

nsis:
  # Space-free name: the default "${productName} Setup ${version}.exe" has spaces,
  # which GitHub rewrites to dots on the uploaded asset while electron-builder
  # writes them as hyphens in latest.yml — the mismatch 404s auto-update
  # ("Cannot download"). A hyphenated name keeps asset + manifest identical.
  artifactName: ${productName}-Setup-${version}.${ext}
  # One-click (Discord/Slack-style): silent per-user install with no wizard, no
  # directory picker, and no UAC prompt (perMachine:false → %LocalAppData%). The
  # payoff for auto-update: quitAndInstall applies the update SILENTLY and
  # relaunches, instead of popping the installer wizard on every update.
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false

mac:
  category: public.app-category.social-networking
  target:
    - target: dmg
      arch: [arm64, x64]
    # electron-updater applies macOS updates from a ZIP (not the DMG), so it must
    # be built and published alongside for auto-update to work. NOTE: Squirrel.Mac
    # refuses to install unsigned updates — macOS auto-update stays inert until
    # real signing (CSC_*/APPLE_* secrets) is enabled; Windows + Linux update fine.
    - target: zip
      arch: [arm64, x64]
  icon: build/icon.png
  # No cert: skip signing entirely (identity: null) rather than attempt the
  # ad-hoc codesign that was failing. Produces an unsigned .dmg (users
  # right-click → Open on first launch). hardenedRuntime/notarization only make
  # sense with real signing — add CSC_*/APPLE_* secrets to enable later.
  identity: null
  gatekeeperAssess: false
  # macOS requires these usage strings in the app's Info.plist or the OS blocks
  # camera/mic/screen access outright (the dev Electron binary ships its own, so
  # this only bites the packaged build). Without them, "camera doesn't work" on
  # the installed app.
  extendInfo:
    NSCameraUsageDescription: Umbry uses your camera for video calls.
    NSMicrophoneUsageDescription: Umbry uses your microphone for calls and voice messages.

linux:
  category: Network
  # AppImage only — a single portable file that runs on any distro, no install.
  # (The .deb target is fussier about metadata; add it back later if a friend
  # specifically wants apt/dpkg.)
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
  maintainer: Umbry <noreply@umbry.chat>

# GitHub Releases as the update/publish channel (used by CI on tag builds).
publish:
  provider: github
  owner: danielgmorosan
  repo: umbry

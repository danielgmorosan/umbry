name: Desktop build

# Manual runs produce downloadable artifacts; pushing a `desktop-v*` tag also
# publishes a GitHub Release with the installers attached.
on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (with submodules for the workspace graph)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # No `version` here on purpose — action-setup@v4 reads it from the root
      # package.json `packageManager` field; passing both is a conflict error.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The desktop app now bundles the built web UI (served locally from app://
      # instead of loading umbry.chat), so we need the web workspace + its deps.
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build installers
        working-directory: apps/desktop
        # bundle:web (vite build → apps/web/dist, baked with .env.production) →
        # build (tsc main) → electron-builder packages both. electron-builder
        # targets the host OS: win->nsis, mac->dmg, linux->AppImage+deb.
        # Signing/notarization activate only if the *_CSC / APPLE_* secrets are set;
        # otherwise the installers are unsigned (users get an "unidentified developer"
        # prompt) — fine for internal/testing distribution.
        run: pnpm run bundle:web && pnpm run build && pnpm exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No cert -> don't let electron-builder try (and fail) to auto-discover
          # a macOS signing identity; build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Windows / macOS code-signing (optional):
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization (optional):
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload installers (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: gossip-desktop-${{ matrix.os }}
          if-no-files-found: error
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb

      # Attach the installers AND the electron-updater feed metadata to a DRAFT
      # release. Each matrix OS adds its own files; because the release stays a
      # draft until the publish job below, electron-updater (which ignores drafts)
      # never sees a half-populated release mid-build — no "Cannot find latest.yml"
      # race. Without the latest*.yml + .blockmap (+ macOS .zip), clients can't
      # detect or download updates.
      - name: Attach to draft GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest*.yml

  # Flip the draft to published only after ALL three OS builds have attached
  # their artifacts. This is what makes a release appear to clients atomically —
  # complete, or not at all.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"

name: Desktop build

# Manual runs produce downloadable artifacts; pushing a `desktop-v*` tag also
# publishes a GitHub Release with the installers attached.
on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (with submodules for the workspace graph)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Only the desktop workspace's deps — no web app / gossip-sdk build needed.
      - name: Install desktop deps
        run: pnpm install --filter @gossip/desktop... --frozen-lockfile

      - name: Build installers
        working-directory: apps/desktop
        # electron-builder targets the host OS: win->nsis, mac->dmg, linux->AppImage+deb.
        # Signing/notarization activate only if the *_CSC / APPLE_* secrets are set;
        # otherwise the installers are unsigned (users get an "unidentified developer"
        # prompt) — fine for internal/testing distribution.
        run: pnpm run build && pnpm exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows / macOS code-signing (optional):
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization (optional):
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload installers (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: gossip-desktop-${{ matrix.os }}
          if-no-files-found: error
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
